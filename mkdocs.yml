site_name: Velocmd Explorer
site_description: ⚡ A lightning-fast system launcher powered by a native Rust indexer
site_url: https://yashvardhang.github.io/Velocmd/
site_author: Yashvardhan Gupta
repo_name: YashvardhanG/Velocmd
repo_url: https://github.com/YashvardhanG/Velocmd

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.png
  favicon: assets/logo.png
  font:
    text: Montserrat
    code: Fira Code
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
    - content.code.annotation

  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: cyan

plugins:
  - search
  - blog:
      archive: false
      authors_file: blog/.authors.yml

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - How to Use: getting-started/usage.md
  - Features: features.md
  - Blog:
      - blog/index.md
  - Version History: changelog.md
  - About: about.md
  - FAQ: faq.md

extra_css:
  - stylesheets/custom.css