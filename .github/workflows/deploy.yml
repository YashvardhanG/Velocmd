name: Deploy Documentation
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install dependencies
        run: |
          pip install mkdocs-material mkdocs-blog-plugin

      - name: Fetch Changelog from GitHub Releases
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p docs
          echo "# Version History" > docs/changelog.md
          echo "" >> docs/changelog.md
          
          # Get a clean list of Tag Names only (this will find your "Release" tag)
          TAGS=$(gh release list --limit 10 --json tagName --template '{{range .}}{{.tagName}}{{"\n"}}{{end}}')
          
          if [ -z "$TAGS" ]; then
            echo "No releases found yet." >> docs/changelog.md
          else
            echo "$TAGS" | while read -r tag; do
              [ -z "$tag" ] && continue
              echo "## $tag" >> docs/changelog.md
              gh release view "$tag" --json body --template '{{.body}}' >> docs/changelog.md || echo "Release notes not found." >> docs/changelog.md
              echo -e "\n---\n" >> docs/changelog.md
            done
          fi

      - name: Deploy to GitHub Pages
        run: |
          mkdocs gh-deploy --force